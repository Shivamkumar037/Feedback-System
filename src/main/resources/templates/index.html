<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Event System</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>

        body{
        background: linear-gradient(135deg,#667eea,#764ba2);
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        font-family:'Segoe UI',sans-serif;
        }

        .card{
        padding:40px;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,0.3);
        text-align:center;
        }

    </style>

</head>

<body>

<div class="card">

    <h2 class="mb-4">Event Management System</h2>

    <a href="/create-event" class="btn btn-primary mb-3 w-100">
        Create Event
    </a>

    <a href="/" class="btn btn-success mb-3 w-100">
        View Events
    </a>

    <a href="/feedback" class="btn btn-warning w-100">
        Give Feedback
    </a>

</div>

</body>

</html>
